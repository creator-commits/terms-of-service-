name: Build and Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [contact_form]

jobs:

  send-email:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          subject: "[${{ github.event.client_payload.type }}] ${{ github.event.client_payload.subject }}"
          body: |
            Type:    ${{ github.event.client_payload.type }}
            Name:    ${{ github.event.client_payload.name }}
            From:    ${{ github.event.client_payload.email }}
            Subject: ${{ github.event.client_payload.subject }}
            Request: ${{ github.event.client_payload.reqtype }}
            Work:    ${{ github.event.client_payload.work }}
            Link:    ${{ github.event.client_payload.link }}

            Message:
            ${{ github.event.client_payload.message }}

            ---
            Sent from [@]Creators Terms of Service page

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject secrets
        run: |
          sed -i "s|%%GH_TOKEN%%|${{ secrets.GH_PAT }}|g" index.html
          sed -i "s|%%GH_REPO%%|${{ github.repository }}|g" index.html
          echo "Injection done"

      - name: Deploy to pages-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Copy built file
          cp index.html /tmp/index.html
          
          # Switch to pages-deploy branch
          git fetch origin pages-deploy || true
          git checkout pages-deploy 2>/dev/null || git checkout --orphan pages-deploy
          
          # Clean and replace with built file
          git rm -rf . --quiet || true
          cp /tmp/index.html index.html
          
          git add index.html
          git commit -m "Deploy $(date +%Y-%m-%d\ %H:%M)"
          git push origin pages-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
